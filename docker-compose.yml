version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: gena-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  gena-api:
    build: .
    container_name: gena-api
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - HOST=0.0.0.0
      - API_KEY=gena_api_secret_key_12345
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
      - LOG_LEVEL=info
      - UPLOADS_DIR=/app/uploads
      - SESSIONS_DIR=/app/sessions
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
      - ./sessions:/app/sessions
    restart: always

volumes:
  redis_data:
